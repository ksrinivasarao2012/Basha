# ============================================================================
#  Basha — per-backend settings (model ids, voices, languages)
#  Only the backend you actually run needs to be filled in. The rest are
#  templates for later.
# ============================================================================

tts:
  gtts:
    # gTTS has no "voice" — it picks one per language automatically.
    slow: false

  indic_parler:
    model_id: "ai4bharat/indic-parler-tts"
    default_voice: "Divya"          # example speaker name
    languages: [te, ta, kn, ml, mr, hi]

  xtts:
    model_id: "tts_models/multilingual/multi-dataset/xtts_v2"
    languages: [en, de, fr, es, it, pt]

translation:
  deep_translator:
    provider: "google"              # uses the free Google endpoint

  indictrans2:
    model_id: "ai4bharat/indictrans2-en-indic-1B"

  nllb:
    model_id: "facebook/nllb-200-distilled-600M"
