# ============================================================================
#  Basha — main runtime config
#  This file is DATA, not code. Change values here to switch behaviour without
#  editing Python. Start with the "gtts" backend (works everywhere, no GPU).
# ============================================================================

# Which TTS engine to use by default.
#   gtts         -> free, CPU-only, no key  (START HERE — you have no GPU)
#   auto         -> pick a local model by language (needs a GPU — not for you)
#   indic_parler -> AI4Bharat model for Indian languages (GPU)
#   xtts         -> Coqui model for European languages (GPU)
default_backend: gtts

# Which translation engine to use.
#   deep_translator -> free, no key   (START HERE)
#   indictrans2     -> AI4Bharat, English <-> Indian languages (GPU)
#   nllb            -> Meta model, European pairs (GPU)
translation_backend: deep_translator

cache:
  enabled: true
  max_size_mb: 512        # never re-synthesize an identical request

chunking:
  max_chars: 240          # split long text on clause boundaries above this length

